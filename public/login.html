<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuponera — Iniciar Sesión</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎟️</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
    }
    .logo-circle {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
    }
    .btn-login {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      color: #fff;
      font-weight: 600;
    }
    .btn-login:hover { opacity: 0.9; color: #fff; }
    .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 .2rem rgba(79,70,229,.25); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-circle">🎟️</div>
    <h4 class="text-center fw-bold mb-1">Cuponera</h4>
    <p class="text-center text-muted small mb-4">Sistema de gestión de sorteos</p>

    <div id="alert" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="username" class="form-control" placeholder="admin" autocomplete="username" required />
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="btn btn-outline-secondary" id="togglePwd">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login w-100 py-2" id="btnLogin">
        <span id="btnText">Iniciar Sesión</span>
        <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
      </button>
    </form>
  </div>

  <script>
    // Redirigir si ya tiene token válido
    const token = localStorage.getItem('token');
    if (token) window.location.replace('/app.html');

    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.querySelector('#togglePwd i');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('alert');
      const btnText = document.getElementById('btnText');
      const btnSpinner = document.getElementById('btnSpinner');
      const btnLogin = document.getElementById('btnLogin');

      alert.classList.add('d-none');
      btnLogin.disabled = true;
      btnText.textContent = 'Ingresando...';
      btnSpinner.classList.remove('d-none');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión.');
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        window.location.replace('/app.html');
      } catch (err) {
        alert.textContent = err.message;
        alert.classList.remove('d-none');
        btnLogin.disabled = false;
        btnText.textContent = 'Iniciar Sesión';
        btnSpinner.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
